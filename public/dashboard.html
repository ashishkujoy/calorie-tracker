<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalorieSnap</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="cs-body">

  <!-- Hidden: populated by dashboard.js for auth display / tests -->
  <span id="user-info" class="sr-only"></span>

  <!-- ── Header ───────────────────────────────────────────── -->
  <header class="cs-header">
    <div class="cs-logo-circle" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M3 2v7c0 1.1.9 2 2 2s2-.9 2-2V2" />
        <path d="M7 2v20" />
        <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h0" />
        <path d="M18 13v9" />
      </svg>
    </div>
    <div class="cs-header-text">
      <div class="cs-app-name">CalorieSnap</div>
      <div class="cs-tagline">Track your meals with AI</div>
    </div>
  </header>

  <div class="cs-header-divider"></div>

  <!-- ── Tab bar ──────────────────────────────────────────── -->
  <nav class="cs-tab-bar" aria-label="Main navigation">
    <button class="cs-tab cs-tab--active" data-tab="scan" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round" aria-hidden="true">
        <path d="M3 2v7c0 1.1.9 2 2 2s2-.9 2-2V2" />
        <path d="M7 2v20" />
        <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h0" />
        <path d="M18 13v9" />
      </svg>
      Scan Meal
    </button>
    <button class="cs-tab" data-tab="history" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round" aria-hidden="true">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
        <polyline points="16 7 22 7 22 13" />
      </svg>
      History
    </button>
  </nav>

  <!-- ── Tab panels ───────────────────────────────────────── -->
  <main class="cs-content">

    <!-- Scan Meal panel -->
    <div id="tab-scan" class="cs-tab-panel">
      <div class="cs-card">
        <div id="meal-scan"></div>
      </div>
    </div>

    <!-- History panel -->
    <div id="tab-history" class="cs-tab-panel" hidden></div>

  </main>

  <script type="module" src="/js/dashboard.js"></script>
</body>

</html>
